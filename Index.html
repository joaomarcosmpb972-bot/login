<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width-device=width, initial-scale 1.0">
     <title>Página Login</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container"> <!--DIV PAI-->
        <div class="form-image"> <!--DIV FILHO-->
            <img src="undraw_going-offline_v4oo.svg">
        </div>
        <form class="form"> <!--DIV PAI DE TODOS-->
            
                <div class="form-header"> <!--DIV FILHO-->
                    <div class="title"> <!--DIV NETO-->
                    <h1>Cadastre-se</h1>  <!--BISNETO-->
                </div>

                <div class="login-button"> <!--DIV PAI-->
                    <button><a href="#">Entrar</a></button>
                </div>
            </div>
                <div class="input-group"> <!--DIV FILHO-->
                    <div class="input-box"> <!--DIV NETO-->
                        <label for="firstname">Primeiro Nome</label>
                        <input id="firstname" type="text" name="firstname" placeholder="Digite Seu Nome" required>
                    </div>

                    <div class="input-box"> <!--DIV FILHO-->
                        <label for="lastname">Sobrenome</label>
                        <input id="lastname" type="text" name="lastname" placeholder="Digite Seu Sobrenome" required>
                    </div>

                    <div class="input-box"> <!--DIV FILHO-->
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder=" Digite seu E-mail" required>
                    </div>

                    <div class="input-box"> <!--DIV FILHO-->
                        <label for="number">Celular</label>
                        <input id="number" type="text" name="number" placeholder="(xx) xxxx-xxxx" required>
                    </div>

                    <div class="input-box"> <!--DIV FILHO-->
                        <label for="password">Senha</label>
                        <input id="password" type="password" name="password" placeholder="Digite Sua Senha" required>
                    </div>

                    <div class="input-box"> <!--DIV FILHO-->
                        <label for="Confirmpassword">Confirme Sua Senha</label>
                        <input id="Confirmpassword" type="Confirmpassword" name="Confirmpassword" placeholder="Confirme Sua Senha" required>                    
                    </div>            
                </div>
                <div class="continue-button">
                    <button><a href="#">Continuar</a></button>

                
        </form> <!--MATANDO A DIV PAI DE TODAS-->
        
        </div>

    </div>
       
    
    
</body>
</html>
